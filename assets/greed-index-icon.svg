<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#111c33"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Monogram -->
  <g filter="url(#softShadow)">
    <text
      x="512"
      y="520"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="360"
      font-weight="800"
      letter-spacing="-24"
      fill="#ffffff"
    >GI</text>
    <!-- subtle teal accent on the right edge -->
    <path
      d="M664 362c0-10 8-18 18-18h24c10 0 18 8 18 18v312c0 10-8 18-18 18h-24c-10 0-18-8-18-18z"
      fill="#2dd4bf"
      opacity="0.85"
    />
  </g>

  <!-- simple line chart stroke -->
  <path
    d="M276 690c72-56 120-32 180-88 52-48 84-124 154-92 56 26 74 118 144 74 40-26 68-76 96-108"
    fill="none"
    stroke="#2dd4bf"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <circle cx="276" cy="690" r="12" fill="#2dd4bf"/>
  <circle cx="456" cy="602" r="12" fill="#2dd4bf"/>
  <circle cx="610" cy="510" r="12" fill="#2dd4bf"/>
  <circle cx="754" cy="584" r="12" fill="#2dd4bf"/>
  <circle cx="850" cy="476" r="12" fill="#2dd4bf"/>
</svg>
